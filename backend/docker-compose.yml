services:
  postgres:
    image: postgres:16-alpine
    container_name: riverside-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: riverside
      POSTGRES_PASSWORD: riverside
      POSTGRES_DB: riverside
    ports:
      - "5432:5432"
    volumes:
      - riverside-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riverside -d riverside"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  riverside-pgdata:
